# =============================================================================
# Evolution API (WhatsApp) — https://evolution.sharkgestao.com → 127.0.0.1:8090
# =============================================================================
# O docker-compose publica a Evolution só em loopback: 127.0.0.1:8090→8080 do container.
# O Spring Boot (shark-api) usa a porta 8080 do HOST — NÃO misture os dois no mesmo proxy.
#
# DNS: crie registro A/AAAA evolution.sharkgestao.com → mesmo IP da VPS (nuvem laranja CF).
# NUNCA aponte api.sharkgestao.com para este upstream — esse subdomínio é só do Java (nginx-api).
#
# Instalação:
#   sudo cp nginx-cloudflare-realip.conf /etc/nginx/conf.d/cloudflare-realip.conf
#   sudo cp nginx-evolution.sharkgestao.com.conf /etc/nginx/sites-available/evolution.sharkgestao.com
#   sudo ln -sf /etc/nginx/sites-available/evolution.sharkgestao.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d evolution.sharkgestao.com
#
# No .env na raiz do compose, SERVER_URL=https://evolution.sharkgestao.com (já alinhado ao Manager/QR).
# =============================================================================

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name evolution.sharkgestao.com;

    include /etc/nginx/conf.d/cloudflare-realip.conf;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        proxy_buffering off;
    }
}
