# =============================================================================
# Legado: sharkgestao.com / www apontando ainda para esta VPS
# O front está na Vercel — não há mais arquivos estáticos (dist) aqui.
# Redireciona para o site na Vercel e APIs antigas para api.sharkgestao.com.
# =============================================================================
# Se o DNS de sharkgestao.com já aponta só para a Vercel, este bloco não recebe
# tráfego; pode ser removido do sites-enabled.
# =============================================================================

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sharkgestao.com www.sharkgestao.com;

    include /etc/nginx/conf.d/cloudflare-realip.conf;

    client_max_body_size 25m;

    # Chamadas antigas /api/... → subdomínio oficial (evita casar /apis)
    location ^~ /api/ {
        return 301 https://api.sharkgestao.com$request_uri;
    }
    location = /api {
        return 301 https://api.sharkgestao.com$request_uri;
    }

    location / {
        return 301 https://sharkgestao.com$request_uri;
    }
}
