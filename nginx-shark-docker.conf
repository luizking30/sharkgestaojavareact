# sharkgestao.com atrás da Cloudflare (proxy laranja).
# IPs reais: /etc/nginx/conf.d/cloudflare-realip.conf
# Em produção: HTTPS (443) e redirect na 80 são aplicados pelo Certbot em /etc/nginx/sites-available/shark-docker.

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sharkgestao.com www.sharkgestao.com;

    include /etc/nginx/conf.d/cloudflare-realip.conf;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:4444;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 120;
    }

    # Build: cd front && npm ci && npm run build
    # Ajuste o caminho se copiar o dist para outro diretório.
    location / {
        root /var/www/sharkgestao/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
