# =============================================================================
# API: https://api.sharkgestao.com → Spring Boot (Docker) na mesma VPS.
# O Nginx encaminha para 127.0.0.1:8080 (loopback desta máquina), onde o Docker
# publica o container — padrão em produção com proxy no host; não é “ambiente local” de dev.
# =============================================================================
# Cloudflare (nuvem laranja): na origem o TCP vem dos IPs da CF. O arquivo
# cloudflare-realip.conf define real_ip_header CF-Connecting-IP + set_real_ip_from
# (ranges da CF), assim $remote_addr vira o IP do visitante.
#
# Repassar X-Forwarded-For = $remote_addr (após o real_ip) é o padrão recomendado
# com Spring Boot + server.forward-headers-strategy=native: o Tomcat usa esse
# header (e X-Forwarded-Proto) para request.getRemoteAddr() e links HTTPS.
# Não use aqui $proxy_add_x_forwarded_for a partir do XFF que a CF enviou sem
# o real_ip — sem o include, o Spring veria só o IP da Cloudflare.
#
# Instalação:
#   sudo cp nginx-cloudflare-realip.conf /etc/nginx/conf.d/cloudflare-realip.conf
#   sudo cp nginx-api.sharkgestao.com.conf /etc/nginx/sites-available/api.sharkgestao.com
#   sudo ln -sf /etc/nginx/sites-available/api.sharkgestao.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS na origem (ex. Full strict): sudo certbot --nginx -d api.sharkgestao.com
# =============================================================================

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.sharkgestao.com;

    include /etc/nginx/conf.d/cloudflare-realip.conf;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Após cloudflare-realip.conf: $remote_addr = visitante (CF-Connecting-IP)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
    }
}
