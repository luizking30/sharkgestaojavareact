# 💾 Banco de Dados e Segurança
spring.config.import=optional:file:./.env[.properties],optional:file:./back/.env[.properties]
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
mercado_pago_sample_access_token=${MP_TOKEN}

# 🚀 Otimização de Performance (Silenciando o Hibernate)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=ERROR
# (Opcional) Para validar LIMIT/OFFSET e ausencia de HHH90003004: DEBUG temporario em dev
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# 📧 Configurações de E-mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 📲 Evolution API (WhatsApp)
evolution.enabled=${EVOLUTION_ENABLED:false}
evolution.base-url=${EVOLUTION_BASE_URL:}
evolution.instance=${EVOLUTION_INSTANCE:}
evolution.api-key=${EVOLUTION_API_KEY:}
# true pode gerar balão vazio (especialmente se o texto for só URL). Só ative se aceitar o risco.
evolution.link-preview=${EVOLUTION_LINK_PREVIEW:false}
# Se o destinatário não recebe texto com número BR no formato 12 dígitos, tente true (mantém o 9).
evolution.brazil-mobile-keep-9=${EVOLUTION_BR_MOBILE_KEEP_9:false}

# ⚙️ Infraestrutura e Deploy
# Nginx (atrás da Cloudflare) deve enviar X-Forwarded-Proto e X-Forwarded-For com o IP real
# do cliente — use nginx-cloudflare-realip.conf + proxy em nginx-api.sharkgestao.com.conf.
# Sem o real_ip da Cloudflare, o X-Forwarded-For pode refletir o POP da CF, não o visitante.
server.forward-headers-strategy=native
spring.jpa.hibernate.ddl-auto=update
# VPS fraca: libera o "Started" mais cedo; o primeiro request pode aquecer beans em background.
spring.main.lazy-initialization=true

# 🛠️ Desenvolvimento (Desativados para melhor performance em prod)
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.thymeleaf.cache=true
# Paginação no DB (evita HHH90003004 com fetch de coleção) + menos N+1 em LAZY
spring.jpa.properties.hibernate.default_batch_fetch_size=20
