<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Empresa | Shark Eletrônicos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root { --shark-blue: #0047ab; --shark-light-blue: #00d4ff; --shark-black: #020617; --shark-white: #f8fafc; --shark-red: #ff4d4d; }
    body { background: radial-gradient(circle at center, #001e4d 0%, var(--shark-black) 100%); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
    .login-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); padding: 35px; border-radius: 24px; color: var(--shark-white); width: 100%; max-width: 450px; border: 1px solid rgba(0, 212, 255, 0.3); box-shadow: 0 0 40px rgba(0, 212, 255, 0.15); }
    .form-floating > .form-control { background-color: rgba(2, 6, 23, 0.8) !important; border: 1px solid #1e293b !important; color: white !important; border-radius: 12px; }
    .is-invalid-shark { border-color: var(--shark-red) !important; box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.2) !important; }
    .invalid-msg { color: var(--shark-red); font-size: 0.75rem; text-align: left; margin-top: 5px; font-weight: 600; display: block; }
    .btn-login { width: 100%; padding: 14px; background: var(--shark-blue); border: 1px solid var(--shark-light-blue); color: white; font-weight: 800; border-radius: 12px; transition: 0.3s; text-decoration: none; display: block; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    .btn-login:hover { background: var(--shark-white); color: var(--shark-blue); transform: translateY(-2px); }
    .section-title { font-size: 0.75rem; color: var(--shark-light-blue); font-weight: 800; letter-spacing: 1.5px; margin: 20px 0 10px 5px; text-align: left; text-transform: uppercase; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <img th:src="@{/images/logo.png}" alt="Shark" style="width: 180px; filter: drop-shadow(0 0 5px rgba(0,212,255,0.4));">
    <h5 class="mt-3" style="color: var(--shark-light-blue); font-weight: 800;">CADASTRO DE EMPRESA</h5>
  </div>

  <form th:action="@{/registro-empresa}" method="post" th:object="${usuario}">

    <div class="section-title">Dados da Loja</div>

    <div class="form-floating mb-3">
      <input type="text" name="nomeEmpresa" class="form-control" id="nomeEmpresaInput" placeholder="Shark Eletrônicos" th:value="${nomeEmpresaDigitado}" th:classappend="${#fields.hasErrors('empresa.nome')} ? 'is-invalid-shark' : ''">
      <label for="nomeEmpresaInput"><i class="bi bi-building me-2"></i>Nome da Empresa *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('empresa.nome')}" th:errors="*{empresa.nome}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="text" name="cnpj" class="form-control" id="cnpjInput" placeholder="00.000.000/0000-00" inputmode="numeric" maxlength="18" th:value="${cnpjDigitado}">
      <label for="cnpjInput"><i class="bi bi-card-checklist me-2"></i>CNPJ (Opcional)</label>
    </div>

    <div class="section-title">Dados do Proprietário</div>

    <div class="form-floating mb-3">
      <input type="text" th:field="*{nome}" class="form-control" id="nomeProprietario" placeholder="Seu Nome" th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid-shark' : ''">
      <label for="nomeProprietario"><i class="bi bi-person-badge me-2"></i>Nome Completo *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="text" th:field="*{cpf}" class="form-control" id="cpfInput" placeholder="000.000.000-00" maxlength="14" th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid-shark' : ''">
      <label for="cpfInput"><i class="bi bi-fingerprint me-2"></i>CPF *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="email" th:field="*{email}" class="form-control" id="emailInput" placeholder="email@shark.com" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid-shark' : ''">
      <label for="emailInput"><i class="bi bi-envelope-at me-2"></i>E-mail *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="text" th:field="*{whatsapp}" class="form-control" id="wppInput" placeholder="(00) 00000-0000" th:classappend="${#fields.hasErrors('whatsapp')} ? 'is-invalid-shark' : ''">
      <label for="wppInput"><i class="bi bi-whatsapp me-2"></i>WhatsApp *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('whatsapp')}" th:errors="*{whatsapp}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="text" th:field="*{username}" class="form-control" id="userInput" placeholder="usuario" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid-shark' : ''">
      <label for="userInput"><i class="bi bi-person-lock me-2"></i>Login do Proprietário *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
    </div>

    <div class="form-floating mb-4">
      <input type="password" th:field="*{password}" class="form-control" id="passInput" placeholder="Senha">
      <label for="passInput"><i class="bi bi-key me-2"></i>Senha *</label>
      <span class="invalid-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <button type="submit" class="btn-login mb-3">Criar Empresa e Admin</button>
    <div class="text-center">
      <a th:href="@{/login}" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem;"><i class="bi bi-arrow-left me-1"></i>Voltar ao Login</a>
    </div>
  </form>
</div>

<script>
  const cnpjInput = document.getElementById('cnpjInput');
  cnpjInput.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 2) v = v.replace(/^(\d{2})(\d)/, '$1.$2');
    if (v.length > 5) v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
    if (v.length > 8) v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
    if (v.length > 12) v = v.replace(/(\d{4})(\d)/, '$1-$2');
    if (v.length > 18) v = v.substring(0, 18);
    e.target.value = v;
  });

  const cpfInput = document.getElementById('cpfInput');
  cpfInput.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length <= 11) {
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    }
    e.target.value = v;
  });

  const wppInput = document.getElementById('wppInput');
  wppInput.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 2) v = "(" + v.substring(0, 2) + ") " + v.substring(2);
    if (v.length > 9) v = v.substring(0, 10) + "-" + v.substring(10);
    if (v.length > 15) v = v.substring(0, 15);
    e.target.value = v;
  });
</script>
</body>
</html>
