<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Pagamento Pix - Shark Eletrônicos</title>
</head>
<body>

<div layout:fragment="conteudo">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-primary shadow-lg" style="border-radius: 20px;">
                <div class="card-body p-5 text-center">

                    <div id="area-pagamento">
                        <h2 class="fw-bold text-white mb-4"><i class="bi bi-qr-code"></i> PAGAMENTO VIA PIX</h2>
                        <p class="text-white-50">Escaneie o código abaixo com o aplicativo do seu banco:</p>

                        <div th:if="${qrCodeBase64 != null}" class="bg-white p-3 d-inline-block rounded-3 mb-4">
                            <img th:src="'data:image/png;base64,' + ${qrCodeBase64}" alt="QR Code Pix" style="width: 250px;">
                        </div>

                        <div th:if="${copiaECola != null}" class="mb-4 text-start">
                            <label class="form-label text-white-50 small">Código Copia e Cola:</label>
                            <div class="input-group">
                                <input type="text" class="form-control bg-black text-info border-secondary small"
                                       id="pixCode" th:value="${copiaECola}" readonly>
                                <button class="btn btn-outline-info" type="button" onclick="copyPix()">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                            </div>
                        </div>

                        <div class="alert alert-info border-0 bg-opacity-10 text-info small">
                            <i class="bi bi-hourglass-split me-2"></i>
                            Aguardando confirmação do banco...
                        </div>
                    </div>

                    <div id="area-sucesso" style="display: none;">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                        </div>
                        <h2 class="fw-bold text-white mb-3">PAGAMENTO APROVADO!</h2>
                        <p class="text-white-50 mb-4">Sua recarga foi processada com sucesso. O sistema já foi liberado.</p>
                        <div class="alert alert-success bg-opacity-10 text-success border-success">
                            Redirecionando para o Dashboard em <span id="contador">3</span> segundos...
                        </div>
                    </div>

                    <a th:href="@{/dashboard}" class="btn btn-outline-light w-100 mt-3">VOLTAR AO DASHBOARD</a>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Pegamos os dias que a empresa tinha ANTES da compra (vem do Controller)
        const diasAnteriores = [[${diasAntesDaCompra}]];

        function copyPix() {
            var copyText = document.getElementById("pixCode");
            navigator.clipboard.writeText(copyText.value).then(() => alert("Código Pix copiado!"));
        }

        // Função que fica perguntando ao Java se o pagamento caiu
        const checarStatus = setInterval(() => {
            fetch('/pagamentos/assinatura/status-check?diasAnteriores=' + diasAnteriores)
                .then(res => res.json())
                .then(pago => {
                    if (pago === true) {
                        clearInterval(checarStatus); // Para de perguntar

                        // Troca as telas
                        document.getElementById('area-pagamento').style.display = 'none';
                        document.getElementById('area-sucesso').style.display = 'block';

                        // Contador de redirecionamento
                        let tempo = 3;
                        const timer = setInterval(() => {
                            tempo--;
                            document.getElementById('contador').innerText = tempo;
                            if(tempo <= 0) {
                                clearInterval(timer);
                                window.location.href = "/dashboard";
                            }
                        }, 1000);
                    }
                })
                .catch(err => console.error("Erro ao checar status"));
        }, 5000); // Tenta a cada 5 segundos
        /*]]>*/
    </script>
</th:block>

</body>
</html>
