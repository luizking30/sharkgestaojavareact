<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha | Shark Eletrônicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --shark-blue: #0047ab; --shark-light-blue: #00d4ff; --shark-black: #020617; --shark-white: #f8fafc; --shark-red: #ff4d4d; --shark-yellow: #ffcc00; }
        body { background: radial-gradient(circle at center, #001e4d 0%, var(--shark-black) 100%); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); padding: 40px; border-radius: 24px; color: var(--shark-white); width: 100%; max-width: 420px; box-shadow: 0 0 50px rgba(0, 212, 255, 0.2); border: 1px solid rgba(0, 212, 255, 0.3); text-align: center; }
        .brand-logo { width: 220px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6)); }
        .form-floating > .form-control { background-color: rgba(2, 6, 23, 0.8) !important; border: 1px solid #1e293b !important; color: white !important; border-radius: 12px; }
        .btn-reset { width: 100%; padding: 14px; background: var(--shark-blue); border: 1px solid var(--shark-light-blue); color: white; font-weight: 800; border-radius: 12px; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .btn-reset:hover { background: var(--shark-white); color: var(--shark-blue); transform: translateY(-3px); }
        .alert-error { color: var(--shark-red); font-size: 0.85rem; margin-top: -10px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center">
        <img th:src="@{/images/logo.png}" alt="Shark Eletrônicos" class="brand-logo">
        <h5 style="color: var(--shark-yellow); font-weight: 800; margin-bottom: 10px;">DEFINIR NOVA SENHA</h5>
        <p style="color: #94a3b8; font-size: 0.9rem; mb-4">Crie uma senha forte para sua segurança.</p>
    </div>

    <form th:action="@{/atualizar-senha}" method="post" onsubmit="return validarSenhas()">
        <input type="hidden" name="token" th:value="${token}">

        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control" id="passInput" placeholder="Nova Senha" required>
            <label for="passInput"><i class="bi bi-shield-lock me-2"></i>Nova Senha</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" id="confirmPassInput" class="form-control" placeholder="Confirmar Senha" required>
            <label for="confirmPassInput"><i class="bi bi-check2-circle me-2"></i>Confirmar Senha</label>
        </div>

        <div id="errorMsg" class="alert-error">
            <i class="bi bi-exclamation-triangle-fill me-1"></i> As senhas não coincidem!
        </div>

        <button type="submit" class="btn-reset">Atualizar Senha</button>
    </form>
</div>

<script>
    function validarSenhas() {
        const senha = document.getElementById('passInput').value;
        const confirma = document.getElementById('confirmPassInput').value;
        const erro = document.getElementById('errorMsg');

        if (senha !== confirma) {
            erro.style.display = 'block';
            return false; // Impede o envio do formulário
        }

        erro.style.display = 'none';
        return true; // Permite o envio
    }
</script>
</body>
</html>
